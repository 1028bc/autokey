# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Python test

on:
  push:
    tags:
      - "*"
    branches: [master, develop, beta]
  pull_request:
    branches: [master, develop, beta]

jobs:
  Lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python-version }}"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pip-requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            ${{ runner.os }}-
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgirepository1.0-dev pkg-config libcairo2-dev libdbus-1-dev
          sudo apt-get install $(cat apt-requirements.txt)
          python -m pip install --upgrade pip
          pip install flake8 wheel
          pip install -r pip-requirements.txt
      - name: Python Code Quality and Lint
        uses: ricardochaves/python-lint@v1.4.0
        with:
          python-root-list: "lib/autokey tests"
          use-pylint: false
          use-pycodestyle: false
          use-flake8: true
          use-black: false
          use-mypy: false
          use-isort: false
          extra-flake8-options: >
            --count
            --select=E9,F63,F7,F82
            --show-source
            --statistics
            --builtins=_
            --max-complexity=10
            --max-line-length=127

  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python-version }}"
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pip-requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            ${{ runner.os }}-
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgirepository1.0-dev pkg-config libcairo2-dev libdbus-1-dev
          sudo apt-get install $(cat apt-requirements.txt)
          python -m pip install --upgrade pip
          pip install flake8 tox pytest pytest-cov wheel
          pip install -r pip-requirements.txt
      - name: Test with tox and pytest
        run: |
          tox -e clean,coverage,report
      - name: Upload pytest test results
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: junit/test-results-${{ matrix.python-version }}.xml
        if: ${{ always() }}
      - name: Archive test coverage report
        run: tar -cvzf test_coverage_report-${{ matrix.python-version }}.tar.gz test_coverage_report_html/
      - name: Upload test coverage report
        uses: actions/upload-artifact@v4
        with:
          name: test_coverage_report-${{ matrix.python-version }}.tar.gz
          path: test_coverage_report-${{ matrix.python-version }}.tar.gz
        if: ${{ always() }}

  test-install:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python-version }}"
      - name: Install OS dependencies only
        run: |
          sudo apt-get update
          sudo apt-get install -y libgirepository1.0-dev pkg-config libcairo2-dev libdbus-1-dev
          sudo apt-get install $(cat apt-requirements.txt)
          python -m pip install --upgrade pip
          pip install dbus-python gobject pygobject PyQt5 qscintilla
      - name: Test installation
        run: |
          pip install "${GITHUB_WORKSPACE}"
          autokey-gtk --help
